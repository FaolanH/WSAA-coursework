<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Last Updated</th>
        </tr>
    </thead>

    <tbody>
        {% for d in datasets %}
        <tr class="{{ 'even' if loop.index0 % 2 == 0 else 'odd' }}">
            <td>{{ d.label }}</td>
            <td>{{ d.updated }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
