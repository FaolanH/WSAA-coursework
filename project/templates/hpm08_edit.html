<h1>Edit HPM08 Record</h1>

<form method="POST">
    <label>Period:</label>
    <input name="period" value="{{ row.period }}" required><br><br>

    <label>Geography:</label>
    <input name="geography" value="{{ row.geography }}" required><br><br>

    <label>Value:</label>
    <input name="value" value="{{ row.value }}" required><br><br>

    <button type="submit">Save</button>
</form>
