<!DOCTYPE html>
<html>
<head>
    <title>{{ label }} – Dataset Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>{{ label }} ({{ dataset_id }})</h2>

<h3>Categories</h3>
{% for key, values in categories.items() %}
    <p><strong>{{ key }}:</strong> {{ values|join(', ') }}</p>
{% endfor %}

<h3>Metadata (raw)</h3>
<pre>{{ metadata | tojson(indent=2) }}</pre>

<p><a href="/">← Back to dataset list</a></p>

</body>
</html>
